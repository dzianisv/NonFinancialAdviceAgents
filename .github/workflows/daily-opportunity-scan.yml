name: daily-opportunity-scan

# Always-on scheduler for the daily opportunity radar.
# Runs the DAILY tier only (regime -> dip -> narrative velocity -> convergence),
# posts to ntfy ONLY when an alert fires. No orders. No prod mutation.
#
# Scheduled workflows run on the DEFAULT branch (main) only, so this is inert
# until merged. Use "Run workflow" (workflow_dispatch) to smoke-test first and
# confirm yfinance/crypto fetches succeed from GitHub runner IPs before trusting
# the schedule — a silently rate-limited run is as useless as a laptop cron.

on:
  schedule:
    - cron: "10 8 * * 1-5" # ~08:10 UTC, weekdays
  workflow_dispatch:
    inputs:
      no_notify:
        description: "Print only, do not POST to ntfy"
        type: boolean
        default: false

concurrency:
  group: daily-opportunity-scan
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SCAN_PYTHON: python3
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC || 'mkt-dz-wl-eb53ce91' }}
      SCAN_WATCHLIST: ${{ vars.SCAN_WATCHLIST }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install --quiet yfinance

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run daily opportunity scan
        run: |
          if [ "${{ inputs.no_notify }}" = "true" ]; then
            bun .agents/scripts/jobs/daily_opportunity_scan.ts --no-notify
          else
            bun .agents/scripts/jobs/daily_opportunity_scan.ts
          fi
